name: Sync to Machines

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-linux-desktop:
    name: Sync - Linux Desktop
    runs-on: [self-hosted, linux-desktop]
    steps:
      - name: Pull latest
        run: |
          cd ~/Projects/minecraft-ai-on-linux
          git fetch origin
          git reset --hard origin/main
          echo "Synced on Linux Desktop at $(date)"

  sync-dgx:
    name: Sync - My DGX
    runs-on: [self-hosted, dgx]
    steps:
      - name: Pull latest
        run: |
          cd ~/Projects/minecraft-ai-on-linux
          git fetch origin
          git reset --hard origin/main
          echo "Synced on DGX at $(date)"
